<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Meetup Pro</title>
</head>

<body class="bg-gray-50">
  <nav>
    <div class="flex items-center justify-between p-4">
      <div class="flex items-center">
        <h1 class="text-xl font-bold text-pink-500 font-family: var(--font-sans);"><a href="index.html">Meetup</a></h1>
      </div>
      <div class="flex space-x-4">
        <button><a href="index.html" class="text-pink-500 hover:text-gray-900">Home</a></button>
        <button><a href="login.html" class="text-pink-500 hover:text-gray-900">Log in</a></button>
      </div>
    </div>
  </nav>

  <div class="max-w-lg mx-auto mt-16 p-8 bg-white rounded-2xl shadow-xl">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Meetup Pro</h1>
      <p class="text-gray-600">Unlock premium features and supercharge your Meetup experience</p>
    </div>

    <div class="bg-gradient-to-r from-pink-500 to-purple-600 rounded-xl p-6 mb-8 text-center text-white">
      <p class="text-sm opacity-90 mb-1">Premium Plan</p>
      <div class="flex items-center justify-center gap-1">
        <span class="text-4xl font-bold">$5.99</span>
        <span class="text-lg">/month</span>
      </div>
    </div>

    <div class="space-y-4 mb-8">
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        <span class="text-gray-700">Create unlimited groups</span>
      </div>
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        <span class="text-gray-700">Priority event promotion</span>
      </div>
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        <span class="text-gray-700">Advanced analytics</span>
      </div>
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        <span class="text-gray-700">Ad-free experience</span>
      </div>
    </div>

    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Card Number</label>
        <input type="text" placeholder="1234 5678 9012 3456" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
          <input type="text" placeholder="MM/YY" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CVC</label>
          <input type="text" placeholder="123" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name on Card</label>
        <input type="text" placeholder="John Doe" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none">
      </div>
      <button type="button" onclick="alert('Payment successful! Welcome to Meetup Pro.')" class="w-full bg-pink-500 text-white py-3 rounded-lg font-semibold hover:bg-pink-600 transition mt-4">
        Pay $5.99
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Secure payment powered by Stripe
    </p>
  </div>
</body>

</html>
